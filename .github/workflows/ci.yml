name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - draft
      - main

permissions:
  contents: read

jobs:
  backend-tests:
    name: Backend tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Set up test config
        run: |
          cat > config.yaml <<'YAML'
          database:
            path: ./crf_editor.db
          storage:
            upload_path: ./uploads
          auth:
            secret_key: ci-test-secret-key-with-at-least-32-bytes
          admin:
            bootstrap_password: ci-bootstrap-password-123
          YAML

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Initialize test database file
        working-directory: backend
        run: |
          python - <<'PY'
          from sqlalchemy import select
          from sqlalchemy.orm import Session

          from src.database import get_engine, init_db
          from src.models.project import Project
          from src.models.user import User
          from src.services.auth_service import hash_password

          init_db()
          with Session(get_engine()) as session:
              owner = session.get(User, 1)
              if owner is None:
                  owner = User(
                      id=1,
                      username="ci-export-owner",
                      hashed_password=hash_password("ci-export-pass-123"),
                      is_admin=False,
                  )
                  session.add(owner)
                  session.flush()
              existing_project_id = session.scalar(
                  select(Project.id).where(Project.owner_id == owner.id)
              )
              if existing_project_id is None:
                  session.add(Project(
                      name="CI 导出测试项目",
                      version="1.0",
                      owner_id=owner.id,
                      order_index=1,
                  ))
              session.commit()
          PY

      - name: Run backend tests
        working-directory: backend
        run: python -m pytest

  frontend-tests:
    name: Frontend tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend tests
        working-directory: frontend
        run: node --test tests/*.test.js

  frontend-lint:
    name: Frontend lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend lint
        working-directory: frontend
        run: npm run lint -- --quiet

  frontend-build:
    name: Frontend build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build
